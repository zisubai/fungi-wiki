name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  operations:
    name: Operational script tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Test database backup retention
        run: ./scripts/test-db-backup.sh

  frontend:
    name: Frontend tests and builds
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test and build frontend apps
        run: npm run verify:frontend
      - name: Upload admin coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: admin-coverage
          path: apps/admin/coverage
          if-no-files-found: error
      - name: Upload public website coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: web-coverage
          path: apps/web/coverage
          if-no-files-found: error

  backend:
    name: Go checks and integration smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fungi_wiki
          POSTGRES_USER: fungi
          POSTGRES_PASSWORD: fungi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fungi -d fungi_wiki"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - name: Test API
        run: go test ./...
      - name: Vet API
        run: go vet ./...
      - name: Build API
        run: go build ./cmd/server
      - name: Start API and run integration smoke checks
        env:
          DATABASE_URL: postgres://fungi:fungi@localhost:5432/fungi_wiki?sslmode=disable
          JWT_SECRET: ci-only-secret
          ADMIN_EMAIL: admin@fungi.local
          ADMIN_PASSWORD: ci-admin-password
        run: |
          go run ./cmd/server > /tmp/fungi-api.log 2>&1 &
          api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://localhost:8080/healthz >/dev/null; then
              break
            fi
            if ! kill -0 "$api_pid" 2>/dev/null; then
              cat /tmp/fungi-api.log
              exit 1
            fi
            sleep 1
          done
          ../../scripts/smoke-api.sh
