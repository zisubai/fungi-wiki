services:
  postgres:
    image: postgres:17-alpine
    container_name: fungi-wiki-postgres
    environment:
      POSTGRES_DB: fungi_wiki
      POSTGRES_USER: fungi
      POSTGRES_PASSWORD: fungi
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fungi -d fungi_wiki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
