services:
  postgres:
    image: postgres:17-alpine
    container_name: fungi-wiki-postgres
    environment:
      POSTGRES_DB: fungi_wiki
      POSTGRES_USER: fungi
      POSTGRES_PASSWORD: fungi
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fungi -d fungi_wiki"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: fungi-wiki-api
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://fungi:fungi@postgres:5432/fungi_wiki?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fungi.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
      TRUSTED_PROXIES: 172.16.0.0/12
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      GIN_MODE: release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "5174:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
